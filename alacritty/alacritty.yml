# Font configuration (changes require restart)
font:
    # The size to use.
    size: 11
    # The normal (roman) font face to use.
    normal:
        family: JetBrainsMono Nerd Font
        # Style can be specified to pick a specific face.
        style: Regular

    # The bold font face
    bold:
        family: JetBrainsMono Nerd Font
        # Style can be specified to pick a specific face.
        style: Bold

    # The italic font face
    italic:
        family: JetBrainsMono Nerd Font
        # Style can be specified to pick a specific face.
        style: Italic

colors:
    # Default colors
    primary:
        background: "#1e1e1e"
        foreground: "#d6d6d6"

        dim_foreground: "#dbdbdb"
        bright_foreground: "#d9d9d9"
        dim_background: "#202020" # not sure
        bright_background: "#3a3a3a" # not sure

    # Normal colors
    normal:
        black: "#000000"
        red: "#cd3131"
        green: "#0dbc79"
        yellow: "#e5e510"
        blue: "#2472c8"
        magenta: "#bc3fbc"
        cyan: "#11a8cd"
        white: "#e5e5e5"

    # Bright colors
    bright:
        black: "#666666"
        red: "#f14c4c"
        green: "#23d18b"
        yellow: "#f5f543"
        blue: "#3b8eea"
        magenta: "#d670d6"
        cyan: "#29b8db"
        white: "#e5e5e5"

    # Dim colors
    dim:
        black: "#232323"
        red: "#74423f"
        green: "#5e6547"
        yellow: "#8b7653"
        blue: "#556b79"
        magenta: "#6e4962"
        cyan: "#5c8482"
        white: "#828282"

background_opacity: 1

key_bindings:
    - { key: V, mods: Command, action: Paste }
    - { key: C, mods: Command, action: Copy }
    - { key: Q, mods: Command, action: Quit }
    - { key: N, mods: Control, action: SpawnNewInstance }
    - { key: Return, mods: Command, action: ToggleFullscreen }
    - { key: W, mods: Control, action: Quit }

mouse_bindings:
    - { mouse: Middle, action: Paste }
